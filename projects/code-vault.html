<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Vault</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        /* ============ LIQUID GLASS THEME TOKENS ============ */
        :root {
            /* Base Backgrounds - Deep, vibrant fluid colors */
            --color-bg-base: #00000072;
            
            /* Glass Surfaces (Highly refractive & translucent) */
            --glass-surface-heavy: rgba(108, 108, 129, 0);
            --glass-surface-medium: rgba(104, 104, 104, 0);
            --glass-surface-light: rgba(153, 168, 188, 0);
            --glass-surface-solid: #00000000;
            
            /* Text & Accents (Bright, glowing colors for dark mode) */
            --color-text-primary: #0095ff;
            --color-text-secondary: #022271;
            --color-primary: #00aeff;
            --color-primary-hover: #022271;
            --color-accent: #022271;
            --color-error: #812121;
            
            /* Borders & Shadows (Glossy highlights) */
            --glass-border: 1px solid rgba(255, 255, 255, 0.399);
            --glass-border-highlight: 1px solid rgba(142, 141, 141, 0.419);
            --glass-shadow: 0 8px 32px 0 rgba(255, 255, 255, 0.451);
            --glass-inner-glow: inset 0 0 20px rgba(246, 240, 240, 0.405);
            
            /* Effects - High saturation mimics liquid refraction */
            --glass-blur:blur(10px)  saturate(180%);
            --glass-radius: 50px;
        }

        /* ============ GLOBAL RESET & BASE ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background-color: #0d0f1a;
            background-image:
                linear-gradient(160deg, rgba(13, 15, 26, 0.55) 0%, rgba(19, 26, 43, 0.45) 45%, rgba(13, 15, 26, 0.6) 100%),
                url('../assets/images/code-vault-bg.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--color-text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        @keyframes liquidFlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }

        /* ============ HEADER ============ */
        header {
            background: var(--glass-surface-heavy);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-bottom: var(--glass-border-highlight);
            box-shadow: var(--glass-shadow), var(--glass-inner-glow);
            padding: 30px 20px;
            text-align: center;
            margin-bottom: 30px;
            border-radius: var(--glass-radius);
            position: relative;
            overflow: hidden;
        }

        /* Liquid gleam overlay for header */
        header::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.1), transparent);
            transform: skewX(-20deg);
            animation: gleam 8s infinite;
        }

        @keyframes gleam {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            color: var(--color-primary);
            text-shadow: 0 2px 10px rgb(0, 0, 0);
        }

        header p {
            font-size: 1em;
            color: var(--color-text-secondary);
        }

        /* ============ TABS ============ */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.15);
            flex-wrap: wrap;
        }

        .tab-btn {
            background: none;
            border: none;
            color: var(--color-text-secondary);
            padding: 12px 20px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
            margin-bottom: -1px;
            font-weight: 500;
        }

        .tab-btn:hover {
            color: var(--color-text-primary);
            background: var(--glass-surface-medium);
            border-radius: 8px 8px 0 0;
        }

        .tab-btn.active {
            color: var(--color-primary);
            border-bottom-color: var(--color-primary);
            background: var(--glass-surface-heavy);
            border-radius: 8px 8px 0 0;
            text-shadow: 0 0 10px rgba(56, 189, 248, 0.5);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ============ CORE GLASS SECTIONS ============ */
        .section {
            background: var(--glass-surface-heavy);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: var(--glass-border);
            border-radius: var(--glass-radius);
            box-shadow: var(--glass-shadow), var(--glass-inner-glow);
            padding: 25px;
            margin-bottom: 25px;
        }

        h2 {
            color: var(--color-primary);
            margin-bottom: 20px;
            font-size: 1.6em;
            text-shadow: 0 2px 8px rgba(56, 189, 248, 0.2);
        }

        h3 {
            color: var(--color-accent);
            margin-top: 15px;
            margin-bottom: 10px;
            font-size: 1.2em;
        }

        /* ============ FORMS & INPUTS ============ */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--color-text-secondary);
            font-weight: 600;
            font-size: 0.95em;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border: var(--glass-border);
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.2);
            color: var(--color-text-primary);
            font-family: inherit;
            font-size: 0.95em;
            transition: all 0.3s ease;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: var(--color-primary);
            background: rgba(0, 0, 0, 0.4);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2), inset 0 2px 4px rgba(0,0,0,0.3);
        }

        input::placeholder, textarea::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        select option {
            background-color: var(--glass-surface-solid);
            color: var(--color-text-primary);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            font-family: 'Monaco', 'Menlo', monospace;
        }

        /* ============ BUTTONS ============ */
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--color-primary), #2563eb);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            text-decoration: none;
            cursor: pointer;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
            font-weight: 600;
            margin-right: 10px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.6);
            border-color: rgba(255,255,255,0.4);
        }

        .btn:focus-visible {
            outline: 2px solid var(--color-primary);
            outline-offset: 2px;
        }

        .btn-secondary {
            background: var(--glass-surface-medium);
            color: var(--color-text-primary);
            border: var(--glass-border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn-secondary:hover {
            background: var(--glass-surface-heavy);
            border: var(--glass-border-highlight);
            color: var(--color-primary);
        }

        /* ============ CODE BLOCKS & CARDS ============ */
        .snippet-card {
            background: var(--glass-surface-medium);
            border: var(--glass-border);
            border-radius: var(--glass-radius);
            padding: 20px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
            box-shadow: var(--glass-inner-glow), 0 4px 15px rgba(0,0,0,0.2);
        }

        .snippet-card:hover {
            border-color: var(--color-primary);
            transform: translateY(-3px);
            background: var(--glass-surface-heavy);
            box-shadow: 0 8px 25px rgba(0,0,0,0.4), inset 0 0 20px rgba(56, 189, 248, 0.1);
        }

        .snippet-card h4 {
            color: var(--color-primary);
            margin-bottom: 12px;
            font-size: 1.2em;
        }

        .snippet-card-meta {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .badge {
            display: inline-block;
            background: rgba(56, 189, 248, 0.15);
            color: var(--color-primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 600;
            border: 1px solid rgba(56, 189, 248, 0.3);
            backdrop-filter: blur(4px);
        }

        .badge-accent {
            background: rgba(52, 211, 153, 0.15);
            color: var(--color-accent);
            border-color: rgba(52, 211, 153, 0.3);
        }

        .code-container {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            overflow: hidden;
            margin: 15px 0;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.5);
        }

        .code-header {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .code-header span {
            font-size: 0.9em;
            color: var(--color-text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        pre {
            margin: 0;
            padding: 15px;
            overflow-x: auto;
        }

        code {
            font-family: 'Monaco', 'Menlo', monospace;
            font-size: 0.9em;
            background: transparent !important; 
        }

        /* ============ CHAT INTERFACE ============ */
        .chat-container {
            background: rgba(0,0,0,0.2);
            border: var(--glass-border);
            border-radius: var(--glass-radius);
            padding: 20px;
            height: 400px;
            overflow-y: auto;
            margin-bottom: 15px;
            box-shadow: inset 0 2px 15px rgba(0,0,0,0.3);
        }

        .chat-message {
            margin-bottom: 15px;
            padding: 12px 15px;
            border-radius: 8px;
            animation: slideIn 0.3s ease;
            max-width: 85%;
            backdrop-filter: blur(8px);
        }

        .chat-message.user {
            background: rgba(56, 189, 248, 0.15);
            border-right: 4px solid var(--color-primary);
            text-align: right;
            margin-left: auto;
            border-left: 1px solid rgba(255,255,255,0.1);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .chat-message.bot {
            background: rgba(52, 211, 153, 0.15);
            border-left: 4px solid var(--color-accent);
            border-right: 1px solid rgba(255,255,255,0.1);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* ============ QUIZ & NOTES ============ */
        .quiz-option {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: all 0.2s ease;
        }
        
        .quiz-option:hover {
            background: rgba(255,255,255,0.05);
            transform: translateX(5px);
            border-color: rgba(255,255,255,0.3);
        }

        .quiz-progress {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .quiz-progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--color-primary), var(--color-accent));
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(52, 211, 153, 0.5);
        }

        .quiz-results {
            background: rgba(52, 211, 153, 0.05);
            border: 1px solid rgba(52, 211, 153, 0.3);
            border-radius: var(--glass-radius);
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .score-display {
            font-size: 3.5em;
            font-weight: bold;
            color: var(--color-primary);
            margin: 20px 0;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .note-item {
            background: rgba(0,0,0,0.2);
            border-left: 4px solid var(--color-primary);
            border-top: 1px solid rgba(255,255,255,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 0 8px 8px 0;
            backdrop-filter: blur(4px);
            transition: transform 0.2s;
        }
        
        .note-item:hover {
            transform: translateX(3px);
            background: rgba(255,255,255,0.05);
        }

        .note-title {
            color: var(--color-primary);
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.1em;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .success-message {
            background: rgba(52, 211, 153, 0.15);
            border: 1px solid var(--color-accent);
            color: var(--color-accent);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-weight: 600;
            backdrop-filter: blur(4px);
        }

        .success-message.show {
            display: block;
            animation: slideIn 0.3s ease;
        }

        @media (max-width: 768px) {
            .grid-2 {
                grid-template-columns: 1fr;
            }
            header h1 {
                font-size: 1.8em;
            }
            .tabs {
                flex-direction: column;
                border-bottom: none;
            }
            .tab-btn {
                border-bottom: none;
                border-left: 3px solid transparent;
                text-align: left;
                background: var(--glass-surface-light);
                margin-bottom: 5px;
                border-radius: 8px;
            }
            .tab-btn.active {
                border-left-color: var(--color-primary);
                background: var(--glass-surface-heavy);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1> Code Vault </h1>
        </header>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('snippets')"> Save Code</button>
            <button class="tab-btn" onclick="switchTab('library')">My Library</button>
            <button class="tab-btn" onclick="switchTab('notes')"> Notes</button>
            <button class="tab-btn" onclick="switchTab('chat')"> AI Chat</button>
            <button class="tab-btn" onclick="switchTab('quiz')"> Quiz</button>
        </div>

        <div id="snippets" class="tab-content active">
            <div class="section">
                <h2> Save Code</h2>
                <div class="success-message" id="successMsg">✅ Code saved successfully!</div>
                
                <div class="form-group">
                    <label>Code Title</label>
                    <input type="text" id="snippetTitle" placeholder="e.g., React Hooks Example">
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label>Programming Language</label>
                        <select id="language">
                            <option value="javascript">JavaScript</option>
                            <option value="python">Python</option>
                            <option value="java">Java</option>
                            <option value="cpp">C++</option>
                            <option value="html">HTML</option>
                            <option value="css">CSS</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Category</label>
                        <select id="category">
                            <option value="web">Web Development</option>
                            <option value="data">Data Structures</option>
                            <option value="algorithm">Algorithms</option>
                            <option value="mobile">Mobile Dev</option>
                            <option value="database">Database</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Tags (comma separated)</label>
                    <input type="text" id="tags" placeholder="e.g., react, hooks, useState">
                </div>

                <div class="form-group">
                    <label>Code</label>
                    <textarea id="codeInput" placeholder="Paste your code here..."></textarea>
                </div>

                <div class="form-group">
                    <label>Source URL (optional)</label>
                    <input type="url" id="sourceUrl" placeholder="https://...">
                </div>

                <button class="btn" onclick="saveSnippet()"> Save Code</button>
            </div>

            <div class="section">
                <h3> Quick Example - Click to Load</h3>
                <button class="btn btn-secondary" onclick="loadExampleJS()">Load JS Example</button>
                <button class="btn btn-secondary" onclick="loadExamplePython()">Load Python Example</button>
            </div>
        </div>

        <div id="library" class="tab-content">
            <div class="section">
                <h2> Saved Code Library</h2>
                
                <div class="form-group">
                    <input type="text" id="searchInput" placeholder="🔍 Search saved by title, language, or tags..." onkeyup="searchSnippets()">
                </div>

                <div id="snippetsList"></div>
            </div>
        </div>

        <div id="notes" class="tab-content">
            <div class="section">
                <h2>Add Notes About Saved Code</h2>
                
                <div class="form-group">
                    <label>Select Snippet</label>
                    <select id="snippetSelect" onchange="loadSnippetForNote()">
                        <option value="">-- Choose a saved Code --</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Note Title</label>
                    <input type="text" id="noteTitle" placeholder="e.g., Why I saved this">
                </div>

                <div class="form-group">
                    <label>Note Content</label>
                    <textarea id="noteContent" placeholder="Why did you save this? What are the use cases?"></textarea>
                </div>

                <button class="btn" onclick="saveNote()"> Save Note</button>
            </div>

            <div class="section" style="background: transparent; box-shadow: none; border: none; padding: 0;">
                <h2 style="padding-left: 5px;"> My Notes</h2>
                <div id="notesList"></div>
            </div>
        </div>

        <div id="chat" class="tab-content">
            <div class="section">
                <h2> AI Chatbox - Ask About Your Code</h2>
                
                <div class="form-group">
                    <label>Select Code to Chat About</label>
                    <select id="chatSnippetSelect" onchange="loadChatContext()">
                        <option value="">-- Choose a Saved Code (or chat without context) --</option>
                    </select>
                </div>

                <div class="chat-container" id="chatBox">
                    <div class="chat-message bot">
                        <strong>Code Vault AI:</strong> Hi! I'm your coding assistant. Ask me anything about your code! 👋
                    </div>
                </div>

                <div class="form-group">
                    <input type="text" id="chatInput" placeholder="Ask a question about your code..." onkeypress="handleChatKeypress(event)">
                </div>

                <button class="btn" onclick="sendChatMessage()">Send Message</button>
            </div>
        </div>

        <div id="quiz" class="tab-content">
            <div class="section">
                <h2> Auto-Generated Quiz</h2>
                
                <div class="form-group">
                    <label>Select Code to Generate Quiz</label>
                    <select id="quizSnippetSelect">
                        <option value="">-- Choose a saved Code --</option>
                    </select>
                </div>

                <button class="btn" onclick="generateQuiz()">Generate Quiz</button>
            </div>

            <div id="quizContainer" class="section" style="display: none;">
                <div id="quizContent"></div>
            </div>
        </div>
    </div>

    <script>
        // ============ DATA STORAGE ============
        let snippets = JSON.parse(localStorage.getItem('codeVaultSnippets')) || [];
        let notes = JSON.parse(localStorage.getItem('codeVaultNotes')) || [];
        let currentQuizIndex = 0;
        let quizScore = 0;
        let currentQuizQuestions = [];

        // ============ TAB SWITCHING ============
        function switchTab(tabName) {
            const contents = document.querySelectorAll('.tab-content');
            contents.forEach(content => content.classList.remove('active'));
            
            const buttons = document.querySelectorAll('.tab-btn');
            buttons.forEach(button => button.classList.remove('active'));
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');

            if (tabName === 'library') displaySnippets();
            if (tabName === 'notes') displayNotes();
            if (tabName === 'quiz') updateQuizDropdown();
        }

        // ============ SAVE SNIPPET ============
        function saveSnippet() {
            const title = document.getElementById('snippetTitle').value;
            const language = document.getElementById('language').value;
            const category = document.getElementById('category').value;
            const tags = document.getElementById('tags').value.split(',').map(t => t.trim());
            const code = document.getElementById('codeInput').value;
            const sourceUrl = document.getElementById('sourceUrl').value;

            if (!title || !code) {
                alert('Please fill in title and code!');
                return;
            }

            const snippet = {
                id: Date.now(),
                title,
                language,
                category,
                tags,
                code,
                sourceUrl,
                createdAt: new Date().toLocaleDateString()
            };

            snippets.push(snippet);
            localStorage.setItem('codeVaultSnippets', JSON.stringify(snippets));

            const successMsg = document.getElementById('successMsg');
            successMsg.classList.add('show');
            setTimeout(() => successMsg.classList.remove('show'), 3000);

            document.getElementById('snippetTitle').value = '';
            document.getElementById('codeInput').value = '';
            document.getElementById('tags').value = '';
            document.getElementById('sourceUrl').value = '';

            updateAllDropdowns();
        }

        // ============ DISPLAY SNIPPETS ============
        function displaySnippets() {
            const list = document.getElementById('snippetsList');
            if (snippets.length === 0) {
                list.innerHTML = '<p style="color: var(--color-text-secondary); padding: 15px;">No snippets saved yet. Create one!</p>';
                return;
            }

            list.innerHTML = snippets.map(snippet => `
                <div class="snippet-card">
                    <h4>${snippet.title}</h4>
                    <div class="snippet-card-meta">
                        <span class="badge">${snippet.language}</span>
                        <span class="badge badge-accent">${snippet.category}</span>
                    </div>
                    <div class="code-container">
                        <div class="code-header">
                            <span>${snippet.language}</span>
                            <button class="btn btn-secondary" onclick="copyCode(${snippet.id})" style="padding: 4px 12px; font-size: 0.85em; margin: 0;">📋 Copy</button>
                        </div>
                        <pre><code class="language-${snippet.language}">${escapeHtml(snippet.code)}</code></pre>
                    </div>
                    <div style="margin-top: 15px; color: var(--color-text-secondary); font-size: 0.9em; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 10px;">
                        📅 Saved: ${snippet.createdAt} | 🏷️ ${snippet.tags.join(', ')}
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });
        }

        // ============ SEARCH SNIPPETS ============
        function searchSnippets() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('snippetsList');

            const filtered = snippets.filter(snippet => 
                snippet.title.toLowerCase().includes(query) ||
                snippet.language.toLowerCase().includes(query) ||
                snippet.tags.some(tag => tag.toLowerCase().includes(query))
            );

            if (filtered.length === 0) {
                list.innerHTML = '<p style="color: var(--color-text-secondary); padding: 15px;">No snippets match your search.</p>';
                return;
            }

            list.innerHTML = filtered.map(snippet => `
                <div class="snippet-card">
                    <h4>${snippet.title}</h4>
                    <div class="snippet-card-meta">
                        <span class="badge">${snippet.language}</span>
                        <span class="badge badge-accent">${snippet.category}</span>
                    </div>
                    <div class="code-container">
                        <div class="code-header">
                            <span>${snippet.language}</span>
                            <button class="btn btn-secondary" onclick="copyCode(${snippet.id})" style="padding: 4px 12px; font-size: 0.85em; margin: 0;">📋 Copy</button>
                        </div>
                        <pre><code class="language-${snippet.language}">${escapeHtml(snippet.code)}</code></pre>
                    </div>
                </div>
            `).join('');

            document.querySelectorAll('pre code').forEach(block => {
                hljs.highlightElement(block);
            });
        }

        // ============ COPY CODE ============
        function copyCode(snippetId) {
            const snippet = snippets.find(s => s.id === snippetId);
            if (snippet) {
                navigator.clipboard.writeText(snippet.code);
                alert('Code copied to clipboard!');
            }
        }

        // ============ SAVE NOTES ============
        function saveNote() {
            const snippetId = document.getElementById('snippetSelect').value;
            const title = document.getElementById('noteTitle').value;
            const content = document.getElementById('noteContent').value;

            if (!snippetId || !title || !content) {
                alert('Please select a snippet and fill all fields!');
                return;
            }

            const note = {
                id: Date.now(),
                snippetId: parseInt(snippetId),
                title,
                content,
                createdAt: new Date().toLocaleDateString()
            };

            notes.push(note);
            localStorage.setItem('codeVaultNotes', JSON.stringify(notes));

            document.getElementById('noteTitle').value = '';
            document.getElementById('noteContent').value = '';

            displayNotes();
            alert('Note saved successfully!');
        }

        // ============ DISPLAY NOTES ============
        function displayNotes() {
            const notesList = document.getElementById('notesList');
            const relevantNotes = notes.filter(note => {
                const selectedId = document.getElementById('snippetSelect').value;
                return selectedId === '' || note.snippetId === parseInt(selectedId);
            });

            if (relevantNotes.length === 0) {
                notesList.innerHTML = '<p style="color: var(--color-text-secondary); padding: 15px;">No notes yet. Add one!</p>';
                return;
            }

            notesList.innerHTML = relevantNotes.map(note => {
                const snippet = snippets.find(s => s.id === note.snippetId);
                return `
                    <div class="note-item">
                        <div class="note-title">${note.title}</div>
                        <div style="font-size: 0.85em; color: var(--color-text-secondary); margin-bottom: 12px;">
                            For: <strong style="color: var(--color-text-primary);">${snippet ? snippet.title : 'Unknown'}</strong> | ${note.createdAt}
                        </div>
                        <div style="color: var(--color-text-primary);">${note.content}</div>
                    </div>
                `;
            }).join('');
        }

        function loadSnippetForNote() {
            displayNotes();
        }

        // ============ CHAT FUNCTIONALITY ============
        function loadChatContext() {
            const snippetId = document.getElementById('chatSnippetSelect').value;
            if (snippetId) {
                const snippet = snippets.find(s => s.id === parseInt(snippetId));
                if (snippet) {
                    const chatBox = document.getElementById('chatBox');
                    const msg = document.createElement('div');
                    msg.className = 'chat-message bot';
                    msg.innerHTML = `<strong>Code Vault AI:</strong> I've loaded "${snippet.title}" (${snippet.language}). Ask me anything about this code!`;
                    chatBox.appendChild(msg);
                    chatBox.scrollTop = chatBox.scrollHeight;
                }
            }
        }

        function handleChatKeypress(event) {
            if (event.key === 'Enter') {
                sendChatMessage();
            }
        }

        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();

            if (!message) return;

            const chatBox = document.getElementById('chatBox');
            
            const userMsg = document.createElement('div');
            userMsg.className = 'chat-message user';
            userMsg.innerHTML = `<strong>You:</strong> ${escapeHtml(message)}`;
            chatBox.appendChild(userMsg);

            setTimeout(() => {
                const responses = [
                    'That\'s a great question! This code demonstrates a key concept in programming.',
                    'I can help you understand this better. The key here is the proper syntax and logic flow.',
                    'Excellent observation! This is a common pattern in modern development.',
                    'This code snippet shows best practices for handling this scenario.',
                    'You can improve this by considering edge cases and error handling.'
                ];
                
                const aiMsg = document.createElement('div');
                aiMsg.className = 'chat-message bot';
                aiMsg.innerHTML = `<strong>Code Vault AI:</strong> ${responses[Math.floor(Math.random() * responses.length)]}`;
                chatBox.appendChild(aiMsg);
                chatBox.scrollTop = chatBox.scrollHeight;
            }, 500);

            input.value = '';
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        // ============ QUIZ GENERATION ============
        function generateQuiz() {
            const snippetId = document.getElementById('quizSnippetSelect').value;
            if (!snippetId) {
                alert('Please select a snippet!');
                return;
            }

            const snippet = snippets.find(s => s.id === parseInt(snippetId));
            
            currentQuizQuestions = [
                {
                    question: `What is the primary purpose of this ${snippet.language} code?`,
                    options: [
                        'Data processing and manipulation',
                        'API integration',
                        'Database operations',
                        'User authentication'
                    ],
                    correct: 0,
                    explanation: 'This code is designed to demonstrate core programming concepts.'
                },
                {
                    question: 'Which of the following best describes the code structure?',
                    options: [
                        'Object-oriented design',
                        'Functional programming',
                        'Procedural approach',
                        'Declarative pattern'
                    ],
                    correct: Math.floor(Math.random() * 4),
                    explanation: 'Code structure depends on the programming paradigm used.'
                },
                {
                    question: `What would happen if you modified the input to this ${snippet.language} code?`,
                    options: [
                        'The output would change accordingly',
                        'The function would break',
                        'Nothing would happen',
                        'It would cause an error'
                    ],
                    correct: 0,
                    explanation: 'Good code should handle various inputs appropriately.'
                }
            ];

            currentQuizIndex = 0;
            quizScore = 0;
            displayQuizQuestion();
        }

        function displayQuizQuestion() {
            const container = document.getElementById('quizContainer');
            container.style.display = 'block';
            const content = document.getElementById('quizContent');

            const question = currentQuizQuestions[currentQuizIndex];
            const progress = ((currentQuizIndex + 1) / currentQuizQuestions.length) * 100;

            content.innerHTML = `
                <div class="quiz-progress">
                    <div class="quiz-progress-bar" style="width: ${progress}%"></div>
                </div>
                <h3 style="margin-bottom: 20px; color: var(--color-text-primary);">Question ${currentQuizIndex + 1} of ${currentQuizQuestions.length}</h3>
                <div class="quiz-question" style="margin-bottom: 25px;">
                    <h4 style="font-size: 1.1em; margin-bottom: 15px; color: var(--color-text-primary);">${question.question}</h4>
                    ${question.options.map((option, index) => `
                        <div class="quiz-option">
                            <input type="radio" id="option${index}" name="answer" value="${index}" style="width: auto; margin: 0; cursor: pointer; box-shadow: none;">
                            <label for="option${index}" style="margin: 0; cursor: pointer; flex: 1; font-weight: 500; color: var(--color-text-primary);">${option}</label>
                        </div>
                    `).join('')}
                </div>
                <button class="btn" onclick="submitQuizAnswer()">Submit Answer</button>
            `;
        }

        function submitQuizAnswer() {
            const selected = document.querySelector('input[name="answer"]:checked');
            if (!selected) {
                alert('Please select an answer!');
                return;
            }

            const answer = parseInt(selected.value);
            const question = currentQuizQuestions[currentQuizIndex];

            if (answer === question.correct) {
                quizScore++;
            }

            const isCorrect = answer === question.correct;
            const content = document.getElementById('quizContent');
            content.innerHTML = `
                <div style="background: ${isCorrect ? 'rgba(52, 211, 153, 0.15)' : 'rgba(239, 68, 68, 0.15)'}; 
                            border: 1px solid ${isCorrect ? 'var(--color-accent)' : 'var(--color-error)'}; 
                            border-radius: 8px; padding: 20px; margin-bottom: 20px;
                            backdrop-filter: blur(4px);">
                    <strong style="color: ${isCorrect ? 'var(--color-accent)' : 'var(--color-error)'}; font-size: 1.2em; display: block; margin-bottom: 10px;">
                        ${isCorrect ? '✅ Correct!' : '❌ Incorrect'}
                    </strong>
                    <p style="color: var(--color-text-primary);">${question.explanation}</p>
                </div>
                <button class="btn" onclick="nextQuizQuestion()">Next Question</button>
            `;
        }

        function nextQuizQuestion() {
            currentQuizIndex++;
            if (currentQuizIndex < currentQuizQuestions.length) {
                displayQuizQuestion();
            } else {
                displayQuizResults();
            }
        }

        function displayQuizResults() {
            const content = document.getElementById('quizContent');
            const percentage = Math.round((quizScore / currentQuizQuestions.length) * 100);

            content.innerHTML = `
                <div class="quiz-results">
                    <h3 style="font-size: 1.8em; margin-bottom: 15px; color: var(--color-text-primary);">🎉 Quiz Complete!</h3>
                    <div class="score-display">${quizScore} / ${currentQuizQuestions.length}</div>
                    <p style="font-size: 1.2em; color: var(--color-text-primary); font-weight: 600;">You scored ${percentage}%</p>
                    <p style="margin: 20px 0 30px 0; color: var(--color-text-secondary);">
                        ${percentage >= 80 ? '🌟 Excellent work!' : percentage >= 60 ? '👍 Good job! Review the missed questions.' : '📚 Keep studying and try again!'}
                    </p>
                    <button class="btn btn-secondary" onclick="document.getElementById('quizContainer').style.display = 'none'; document.getElementById('quizSnippetSelect').value = '';">Back to Selection</button>
                </div>
            `;
        }

        // ============ UPDATE DROPDOWNS ============
        function updateAllDropdowns() {
            updateSnippetSelect();
            updateQuizDropdown();
            updateChatDropdown();
        }

        function updateSnippetSelect() {
            const select = document.getElementById('snippetSelect');
            select.innerHTML = '<option value="">-- Choose a snippet --</option>' +
                snippets.map(s => `<option value="${s.id}">${s.title}</option>`).join('');
        }

        function updateQuizDropdown() {
            const select = document.getElementById('quizSnippetSelect');
            select.innerHTML = '<option value="">-- Choose a snippet --</option>' +
                snippets.map(s => `<option value="${s.id}">${s.title}</option>`).join('');
        }

        function updateChatDropdown() {
            const select = document.getElementById('chatSnippetSelect');
            select.innerHTML = '<option value="">-- Choose a snippet (or chat without context) --</option>' +
                snippets.map(s => `<option value="${s.id}">${s.title}</option>`).join('');
        }

        // ============ EXAMPLE LOADERS ============
        function loadExampleJS() {
            document.getElementById('snippetTitle').value = 'React Hooks - useState Example';
            document.getElementById('language').value = 'javascript';
            document.getElementById('category').value = 'web';
            document.getElementById('tags').value = 'react, hooks, useState, functional-component';
            document.getElementById('codeInput').value = `import React, { useState } from 'react';

export const Counter = () => {
  const [count, setCount] = useState(0);

  const increment = () => setCount(count + 1);
  const decrement = () => setCount(count - 1);

  return (
    <div>
      <h1>Count: {count}</h1>
      <button onClick={increment}>+</button>
      <button onClick={decrement}>-</button>
    </div>
  );
};`;
        }

        function loadExamplePython() {
            document.getElementById('snippetTitle').value = 'Python - Quick Sort Algorithm';
            document.getElementById('language').value = 'python';
            document.getElementById('category').value = 'algorithm';
            document.getElementById('tags').value = 'sorting, algorithms, python, quicksort';
            document.getElementById('codeInput').value = `def quick_sort(arr):
    """
    Quick sort algorithm implementation
    Time Complexity: O(n log n) average, O(n²) worst
    """
    if len(arr) <= 1:
        return arr
    
    pivot = arr[len(arr) // 2]
    left = [x for x in arr if x < pivot]
    middle = [x for x in arr if x == pivot]
    right = [x for x in arr if x > pivot]
    
    return quick_sort(left) + middle + quick_sort(right)

# Usage
numbers = [64, 34, 25, 12, 22, 11, 90]
sorted_numbers = quick_sort(numbers)
print(sorted_numbers)  # [11, 12, 22, 25, 34, 64, 90]`;
        }

        // ============ UTILITY FUNCTIONS ============
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Initialize
        updateAllDropdowns();
    </script>
</body>
</html>
